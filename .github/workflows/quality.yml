name: quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Validate repository contracts
        run: >-
          metro-agent validate
          --metrics examples/synthetic_data/metrics.json
          --gold-cases examples/synthetic_data/gold_cases.json
          --data examples/synthetic_data/passenger_flow.csv
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install quality tools
        run: python -m pip install --upgrade pip && python -m pip install -e . build coverage ruff
      - name: Lint
        run: ruff check src tests
      - name: Check WeChat Mini Program structure
        run: python scripts/check_miniprogram.py
      - name: Coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report --fail-under=85
          coverage xml
      - name: Build package
        run: python -m build
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
