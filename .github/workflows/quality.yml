name: quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e .
      - name: Validate repository contracts
        run: >-
          metro-agent validate
          --metrics examples/synthetic_data/metrics.json
          --gold-cases examples/synthetic_data/gold_cases.json
          --data examples/synthetic_data/passenger_flow.csv
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Evaluate governed assistant Gold Cases
        run: python scripts/evaluate_assistant.py --output /tmp/metro-assistant-eval.json

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install quality tools
        run: python -m pip install --upgrade pip && python -m pip install -e . build coverage ruff
      - name: Lint
        run: ruff check src tests
      - name: Check WeChat Mini Program structure
        run: python scripts/check_miniprogram.py
      - name: Coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report --fail-under=85
          coverage xml
      - name: Build package
        run: python -m build
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: clients/web/package-lock.json
      - name: Install backend and frontend
        run: |
          python -m pip install -e ../..
          npm ci
      - name: Verify generated OpenAPI client
        run: |
          python ../../scripts/export_openapi.py
          npm run generate-client
          git diff --exit-code -- openapi.json src/client
      - name: Lint, type-check, and build
        run: |
          npm run lint
          npm run build
      - name: Run browser acceptance tests
        run: |
          npx playwright install --with-deps chromium
          npm run test:e2e

  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build Compose images
        run: docker compose build
      - name: Run Compose smoke test
        run: |
          docker compose up --detach --wait --wait-timeout 120
          curl --fail --silent --show-error http://127.0.0.1:8080/health
          curl --fail --silent --show-error http://127.0.0.1:8080/api/v1/catalog
      - name: Stop Compose services
        if: always()
        run: docker compose down --remove-orphans
