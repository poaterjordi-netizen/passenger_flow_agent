name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  p0-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: metro-agent validate --metrics examples/synthetic_data/metrics.json --gold-cases examples/synthetic_data/gold_cases.json --data examples/synthetic_data/passenger_flow.csv
      - run: metro-agent query --metrics examples/synthetic_data/metrics.json --data examples/synthetic_data/passenger_flow.csv --query-ir examples/query_ir/entries_by_station.json --audit /tmp/metro-query-audit.json
      - run: metro-agent eval --metrics examples/synthetic_data/metrics.json --data examples/synthetic_data/passenger_flow.csv --gold-cases examples/synthetic_data/gold_cases.json --report /tmp/metro-p1-eval.json
      - run: python -m unittest discover -s tests -v
