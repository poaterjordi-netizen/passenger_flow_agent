name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  p0-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e .
      - run: metro-agent validate --metrics examples/synthetic_data/metrics.json --gold-cases examples/synthetic_data/gold_cases.json --data examples/synthetic_data/passenger_flow.csv
      - run: python -m unittest discover -s tests -v
