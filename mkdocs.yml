site_name: 地铁客流智能体
site_description: 受治理、可审计、证据驱动的地铁客流分析智能体。
site_url: https://passenger-flow-agent.readthedocs.io/
repo_url: https://github.com/poaterjordi-netizen/passenger_flow_agent
repo_name: poaterjordi-netizen/passenger_flow_agent
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - 项目总览: index.md
  - 迭代进展: progress_since_02992ee.md
  - 用户使用:
      - 快速开始: quickstart_cn.md
      - 使用指南: user_guide_cn.md
      - Web 与部署: web_and_deployment.md
      - 微信小程序: mobile_miniprogram.md
  - 系统设计:
      - 总体架构: architecture.md
      - 智能体工作流: assistant_architecture.md
      - 确定性查询闭环: p1_deterministic_loop.md
      - 数据库与指定日预测: database_and_forecast.md
      - 数据契约: data_contract.md
      - 指标字典: metric_dictionary.md
      - 威胁模型: threat_model.md
      - Hermes 批评复核与修正: hermes_critique_resolution_20260721.md
  - 合作开发:
      - 项目结构: project_structure_cn.md
      - 开发者指南: developer_guide_cn.md
      - 产品边界: sanitized_requirements.md
      - 开源复用评估: open_source_reuse_assessment.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
