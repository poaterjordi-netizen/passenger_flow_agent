# Included by nginx.conf inside the global http block.
# The dashboard performs a bounded fan-out of catalog, governance, health, and
# fixed QueryIR requests. Give those short requests their own usable bucket so
# they cannot consume the much smaller assistant-message budget.
limit_req_zone $binary_remote_addr zone=metro_real_shadow_api:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=metro_real_shadow_assistant:10m rate=6r/m;
limit_conn_zone $binary_remote_addr zone=metro_real_shadow_conn:10m;
limit_conn_zone $binary_remote_addr zone=metro_real_shadow_assistant_conn:10m;
